<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova — Agents</title>
<style>
/* ── Reset & Tokens ─────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050816;
  --bg2:#0A0F24;
  --surface:rgba(255,255,255,0.04);
  --surface-hover:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);
  --border-glow:rgba(139,92,246,0.25);
  --text:#E8E6F0;
  --dim:rgba(232,230,240,0.5);
  --purple:#8B5CF6;
  --purple-dim:rgba(139,92,246,0.15);
  --cyan:#38BDF8;
  --cyan-dim:rgba(56,189,248,0.12);
  --green:#34D399;
  --green-dim:rgba(52,211,153,0.12);
  --amber:#FBBF24;
  --amber-dim:rgba(251,191,36,0.12);
  --red:#EF4444;
  --red-dim:rgba(239,68,68,0.12);
  --radius:14px;
  --radius-sm:8px;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;flex-direction:column;
}

/* ── Scrollbar ───────────────────────────────────────────────────── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}

/* ── Top Bar ─────────────────────────────────────────────────────── */
.topbar{
  height:56px;display:flex;align-items:center;gap:16px;
  padding:0 24px;border-bottom:1px solid var(--border);
  background:rgba(5,8,22,0.85);backdrop-filter:blur(20px);
  -webkit-app-region:drag;flex-shrink:0;z-index:100;
}
.topbar *{-webkit-app-region:no-drag}
.back{
  color:var(--dim);text-decoration:none;font-size:13px;
  display:flex;align-items:center;gap:4px;transition:color .2s;
}
.back:hover{color:var(--text)}
.topbar h1{font-size:16px;font-weight:600;flex:1}
.search-box{
  width:260px;height:34px;border-radius:var(--radius-sm);
  background:var(--surface);border:1px solid var(--border);
  padding:0 12px;color:var(--text);font-size:13px;outline:none;
  transition:border-color .2s;
}
.search-box:focus{border-color:var(--border-glow)}
.search-box::placeholder{color:var(--dim)}

/* ── Layout: Grid + Chat ─────────────────────────────────────────── */
.main{display:flex;flex:1;overflow:hidden;position:relative}

/* ── Agent Grid ──────────────────────────────────────────────────── */
.grid-panel{
  flex:1;overflow-y:auto;padding:24px;
  transition:opacity .3s,transform .3s;
}
.grid-panel.hidden{
  position:absolute;opacity:0;pointer-events:none;transform:translateX(-30px);
}
.agent-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;
}

/* ── Card ────────────────────────────────────────────────────────── */
.agent-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  cursor:pointer;
  transition:transform .2s,border-color .3s,box-shadow .3s;
  display:flex;flex-direction:column;gap:12px;
  position:relative;overflow:hidden;
}
.agent-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% -20%,rgba(139,92,246,0.08),transparent 60%);
  pointer-events:none;
}
.agent-card:hover{
  transform:translateY(-2px);
  border-color:var(--border-glow);
  box-shadow:0 0 24px rgba(139,92,246,0.08);
}
.card-header{display:flex;align-items:center;gap:12px}
.card-icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;background:var(--purple-dim);flex-shrink:0;
  color:var(--purple);
}
.card-icon svg{width:24px;height:24px}
.card-title{font-size:15px;font-weight:600}
.card-type{
  display:inline-block;font-size:10px;font-weight:600;
  letter-spacing:.5px;text-transform:uppercase;
  padding:3px 8px;border-radius:20px;margin-top:2px;
}
.type-on-demand{background:var(--cyan-dim);color:var(--cyan)}
.type-scheduled{background:var(--amber-dim);color:var(--amber)}
.type-continuous{background:var(--green-dim);color:var(--green)}
.card-desc{font-size:13px;color:var(--dim);line-height:1.5;flex:1}
.card-actions{display:flex;gap:8px;margin-top:4px}

/* ── Buttons ─────────────────────────────────────────────────────── */
.btn{
  padding:8px 16px;border-radius:var(--radius-sm);border:none;
  font-size:12px;font-weight:600;cursor:pointer;
  transition:all .2s;display:inline-flex;align-items:center;gap:6px;
}
.btn-primary{background:var(--purple);color:#fff}
.btn-primary:hover{background:#7C4DDB;box-shadow:0 0 16px rgba(139,92,246,0.3)}
.btn-ghost{background:transparent;color:var(--dim);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:rgba(255,255,255,0.15)}
.btn-danger{background:var(--red-dim);color:var(--red)}
.btn-danger:hover{background:rgba(239,68,68,0.2)}
.btn-sm{padding:6px 12px;font-size:11px}

/* ── Chat Panel ──────────────────────────────────────────────────── */
.chat-panel{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  background:var(--bg);
  transition:opacity .3s,transform .3s;
  z-index:50;
}
.chat-panel.hidden{
  opacity:0;pointer-events:none;transform:translateX(30px);
}
.chat-header{
  height:56px;display:flex;align-items:center;gap:12px;
  padding:0 20px;border-bottom:1px solid var(--border);
  background:rgba(10,15,36,0.9);backdrop-filter:blur(16px);flex-shrink:0;
}
.chat-header .agent-emoji{font-size:20px;display:flex;align-items:center;color:var(--purple)}
.chat-header .agent-emoji svg{width:20px;height:20px}
.chat-header .agent-name{font-size:14px;font-weight:600;flex:1}
.chat-messages{
  flex:1;overflow-y:auto;padding:20px;
  display:flex;flex-direction:column;gap:12px;
}
.msg{
  max-width:80%;padding:12px 16px;border-radius:16px;
  font-size:14px;line-height:1.55;
  animation:fadeIn .3s ease;word-break:break-word;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.user{
  align-self:flex-end;
  background:linear-gradient(135deg,#6B51EF,#8B6BFF);
  border-bottom-right-radius:4px;
}
.msg.assistant{
  align-self:flex-start;
  background:var(--surface);border:1px solid var(--border);
  border-bottom-left-radius:4px;
}
.msg.system{
  align-self:center;font-size:12px;color:var(--dim);
  background:transparent;padding:8px 0;
}
.msg pre{
  background:rgba(0,0,0,0.3);padding:10px 12px;border-radius:8px;
  overflow-x:auto;font-size:13px;margin:8px 0;font-family:'Fira Code',monospace;
}

/* ── Thinking dots ───────────────────────────────────────────────── */
.thinking{
  align-self:flex-start;padding:12px 18px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;display:none;
}
.thinking span{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--purple);margin:0 2px;animation:bounce 1.2s infinite;
}
.thinking span:nth-child(2){animation-delay:.2s}
.thinking span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* ── Chat Input ──────────────────────────────────────────────────── */
.chat-input-area{
  padding:12px 20px 20px;flex-shrink:0;
  border-top:1px solid var(--border);
}
.chat-input-bar{
  display:flex;align-items:flex-end;gap:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 14px;
  transition:border-color .2s;
}
.chat-input-bar:focus-within{border-color:var(--border-glow)}
.chat-input-bar textarea{
  flex:1;background:none;border:none;color:var(--text);
  font-size:14px;font-family:inherit;resize:none;outline:none;
  max-height:120px;line-height:1.4;
}
.chat-input-bar textarea::placeholder{color:var(--dim)}
.send-btn{
  width:36px;height:36px;border-radius:50%;border:none;
  background:var(--purple);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .1s,opacity .2s;flex-shrink:0;
}
.send-btn:hover{transform:scale(1.05)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── Config Modal ────────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);
  backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;
  z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:24px;width:440px;max-width:90vw;
  animation:modalIn .3s ease;
}
@keyframes modalIn{from{transform:scale(.95);opacity:0}to{transform:none;opacity:1}}
.modal h2{font-size:16px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal label{display:block;font-size:12px;color:var(--dim);margin:12px 0 4px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.modal input,.modal textarea,.modal select{
  width:100%;padding:10px 12px;border-radius:var(--radius-sm);
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-size:13px;font-family:inherit;outline:none;
  transition:border-color .2s;
}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--border-glow)}
.modal textarea{resize:vertical;min-height:80px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* ── Responsive ──────────────────────────────────────────────────── */
@media(max-width:640px){
  .agent-grid{grid-template-columns:1fr}
  .search-box{width:160px}
}
</style>
</head>
<body>

<!-- ─── Top Bar ───────────────────────────────────────────────────── -->
<div class="topbar">
  <a class="back" href="#" onclick="goBack()" title="Back to Nova">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg>
    Back to Nova
  </a>
  <h1>⚡ Agents</h1>
  <input class="search-box" id="searchBox" type="text" placeholder="Search agents..." oninput="filterAgents()">
</div>

<!-- ─── Main Area ─────────────────────────────────────────────────── -->
<div class="main">

  <!-- Agent Grid -->
  <div class="grid-panel" id="gridPanel">
    <div class="agent-grid" id="agentGrid"></div>
  </div>

  <!-- Chat Panel (hidden by default) -->
  <div class="chat-panel hidden" id="chatPanel">
    <div class="chat-header">
      <button class="btn btn-ghost btn-sm" onclick="closeChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg>
        Back
      </button>
      <span class="agent-emoji" id="chatEmoji"></span>
      <span class="agent-name" id="chatAgentName"></span>
      <span class="card-type" id="chatAgentType"></span>
      <button class="btn btn-ghost btn-sm" onclick="openConfig()" title="Configure">⚙️</button>
      <button class="btn btn-danger btn-sm" id="stopBtn" onclick="stopAgent()" style="display:none">■ Stop</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="msg system" id="chatWelcome"></div>
    </div>
    <div class="thinking" id="thinking"><span></span><span></span><span></span></div>
    <div class="chat-input-area">
      <div class="chat-input-bar">
        <textarea id="chatInput" rows="1" placeholder="Send a task to this agent..." onkeydown="handleChatKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="chatSendBtn" onclick="sendToAgent()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ─── Config Modal ──────────────────────────────────────────────── -->
<div class="modal-overlay" id="configModal">
  <div class="modal">
    <h2>⚙️ Configure <span id="configAgentName"></span></h2>
    <label>Model Override</label>
    <input id="cfgModel" type="text" placeholder="e.g. llama3.2:3b, mistral, etc.">
    <label>System Prompt</label>
    <textarea id="cfgSystemPrompt" placeholder="Custom system instructions for this agent..."></textarea>
    <label>Temperature</label>
    <input id="cfgTemp" type="number" min="0" max="2" step="0.1" value="0.7">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeConfig()">Cancel</button>
      <button class="btn btn-primary" onclick="saveConfig()">Save</button>
    </div>
  </div>
</div>

<script>
/* ─── Agent Definitions ───────────────────────────────────────────── */
const AGENTS = [
  {
    id: 'simple',
    name: 'Simple',
    icon: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>',
    type: 'on-demand',
    description: 'Direct chat agent. Sends your prompt to the local LLM and returns the response. No tools, no loops — pure conversation.',
  },
  {
    id: 'orchestrator',
    name: 'Orchestrator',
    icon: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>',
    type: 'on-demand',
    description: 'Breaks complex tasks into subtasks and delegates to other agents. The conductor of your agent ensemble.',
  },
  {
    id: 'research',
    name: 'Research',
    icon: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>',
    type: 'on-demand',
    description: 'Deep-dives into topics using web search and document analysis. Returns structured findings with sources.',
  },
  {
    id: 'code',
    name: 'Code',
    icon: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/><line x1="14" y1="4" x2="10" y2="20"/></svg>',
    type: 'on-demand',
    description: 'Writes, reviews, and refactors code. Supports shell execution, file I/O, and iterative debugging loops.',
  },
  {
    id: 'react',
    name: 'ReAct',
    icon: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
    type: 'on-demand',
    description: 'Reason + Act loop agent. Thinks step-by-step, uses tools, observes results, and repeats until solved.',
  },
  {
    id: 'monitor',
    name: 'Monitor',
    icon: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>',
    type: 'continuous',
    description: 'Watches system metrics, logs, or URLs on a schedule. Alerts you when thresholds are crossed or anomalies detected.',
  },
  {
    id: 'digest',
    name: 'Digest',
    icon: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>',
    type: 'scheduled',
    description: 'Compiles daily/weekly summaries from your email, calendar, RSS feeds, and project activity.',
  },
  {
    id: 'operative',
    name: 'Operative',
    icon: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/><circle cx="12" cy="16" r="1"/></svg>',
    type: 'on-demand',
    description: 'Stealth agent for sensitive operations. Minimal logging, no external calls, local-only execution.',
  },
];

/* ─── State ───────────────────────────────────────────────────────── */
let activeAgent = null;
let chatHistory = {}; // agentId → [{role, content}]
let agentConfigs = {}; // agentId → {model, systemPrompt, temperature}
let isRunning = false;

/* ─── Render Grid ─────────────────────────────────────────────────── */
function renderGrid(agents) {
  const grid = document.getElementById('agentGrid');
  grid.innerHTML = agents.map(a => `
    <div class="agent-card" data-id="${a.id}" onclick="openAgent('${a.id}')">
      <div class="card-header">
        <div class="card-icon">${a.icon}</div>
        <div>
          <div class="card-title">${a.name}</div>
          <span class="card-type type-${a.type}">${a.type}</span>
        </div>
      </div>
      <div class="card-desc">${a.description}</div>
      <div class="card-actions">
        <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();openAgent('${a.id}')">▶ Run</button>
        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openConfigFor('${a.id}')">⚙️ Configure</button>
      </div>
    </div>
  `).join('');
}

function filterAgents() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  const filtered = AGENTS.filter(a =>
    a.name.toLowerCase().includes(q) ||
    a.description.toLowerCase().includes(q) ||
    a.type.includes(q)
  );
  renderGrid(filtered);
}

/* ─── Agent Chat ──────────────────────────────────────────────────── */
function openAgent(id) {
  const agent = AGENTS.find(a => a.id === id);
  if (!agent) return;
  activeAgent = agent;
  if (!chatHistory[id]) chatHistory[id] = [];

  document.getElementById('gridPanel').classList.add('hidden');
  document.getElementById('chatPanel').classList.remove('hidden');
  document.getElementById('chatEmoji').innerHTML = agent.icon;
  document.getElementById('chatAgentName').textContent = agent.name;

  const typeEl = document.getElementById('chatAgentType');
  typeEl.textContent = agent.type;
  typeEl.className = `card-type type-${agent.type}`;

  document.getElementById('chatWelcome').textContent =
    `${agent.icon} ${agent.name} agent is ready. ${agent.description}`;

  renderChatHistory(id);
  document.getElementById('chatInput').focus();
}

function closeChat() {
  document.getElementById('chatPanel').classList.add('hidden');
  document.getElementById('gridPanel').classList.remove('hidden');
  activeAgent = null;
}

function renderChatHistory(id) {
  const container = document.getElementById('chatMessages');
  const welcome = document.getElementById('chatWelcome');
  // Keep welcome, remove the rest
  while (container.children.length > 1) container.removeChild(container.lastChild);
  // Remove thinking if it's in there
  const thinkEl = document.getElementById('thinking');
  if (thinkEl.parentNode === container) container.removeChild(thinkEl);

  for (const msg of (chatHistory[id] || [])) {
    appendChatMsg(msg.role, msg.content);
  }
}

function appendChatMsg(role, content) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  // Simple markdown: code blocks
  const escaped = content
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>')
    .replace(/`([^`]+)`/g, '<code style="background:rgba(255,255,255,0.06);padding:2px 5px;border-radius:4px;font-size:12px">$1</code>')
    .replace(/\n/g, '<br>');
  div.innerHTML = escaped;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function sendToAgent() {
  if (!activeAgent || isRunning) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  autoResize(input);

  const id = activeAgent.id;
  if (!chatHistory[id]) chatHistory[id] = [];
  chatHistory[id].push({ role: 'user', content: text });
  appendChatMsg('user', text);

  // Show thinking
  isRunning = true;
  const thinking = document.getElementById('thinking');
  const container = document.getElementById('chatMessages');
  thinking.style.display = 'flex';
  container.appendChild(thinking);
  container.scrollTop = container.scrollHeight;
  document.getElementById('stopBtn').style.display = '';

  try {
    if (!window.novaDesktop) throw new Error('Desktop bridge not available');
    const result = await window.novaDesktop.agents.run(id, text);
    thinking.style.display = 'none';
    if (result && result.output) {
      chatHistory[id].push({ role: 'assistant', content: result.output });
      appendChatMsg('assistant', result.output);
    } else if (result && result.error) {
      appendChatMsg('system', `⚠️ ${result.error}`);
    } else {
      appendChatMsg('system', '⚠️ No response from agent');
    }
  } catch (err) {
    thinking.style.display = 'none';
    appendChatMsg('system', `⚠️ ${err.message}`);
  } finally {
    isRunning = false;
    document.getElementById('stopBtn').style.display = 'none';
  }
}

async function stopAgent() {
  if (!activeAgent) return;
  try {
    if (window.novaDesktop) await window.novaDesktop.agents.stop(activeAgent.id);
  } catch (_) {}
  document.getElementById('thinking').style.display = 'none';
  isRunning = false;
  document.getElementById('stopBtn').style.display = 'none';
  appendChatMsg('system', '⏹ Agent stopped');
}

/* ─── Config Modal ────────────────────────────────────────────────── */
function openConfigFor(id) {
  const agent = AGENTS.find(a => a.id === id);
  if (!agent) return;
  activeAgent = agent;
  openConfig();
}

function openConfig() {
  if (!activeAgent) return;
  const cfg = agentConfigs[activeAgent.id] || {};
  document.getElementById('configAgentName').textContent = activeAgent.name;
  document.getElementById('cfgModel').value = cfg.model || '';
  document.getElementById('cfgSystemPrompt').value = cfg.systemPrompt || '';
  document.getElementById('cfgTemp').value = cfg.temperature ?? 0.7;
  document.getElementById('configModal').classList.add('show');
}

function closeConfig() {
  document.getElementById('configModal').classList.remove('show');
}

async function saveConfig() {
  if (!activeAgent) return;
  const cfg = {
    model: document.getElementById('cfgModel').value.trim(),
    systemPrompt: document.getElementById('cfgSystemPrompt').value.trim(),
    temperature: parseFloat(document.getElementById('cfgTemp').value) || 0.7,
  };
  agentConfigs[activeAgent.id] = cfg;
  try {
    if (window.novaDesktop) await window.novaDesktop.agents.configure(activeAgent.id, cfg);
  } catch (_) {}
  closeConfig();
}

/* ─── Helpers ─────────────────────────────────────────────────────── */
function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendToAgent(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function goBack() {
  if (window.novaDesktop) {
    window.novaDesktop.app.switchMode(true);
  } else {
    window.location.href = '../offline.html';
  }
}

// Close modal on overlay click
document.getElementById('configModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeConfig();
});

/* ─── Init ────────────────────────────────────────────────────────── */
renderGrid(AGENTS);

// Try to load real agent list from backend
(async () => {
  try {
    if (window.novaDesktop) {
      const list = await window.novaDesktop.agents.list();
      if (list && list.length) {
        // Merge with defaults — backend is source of truth
        for (const a of list) {
          const idx = AGENTS.findIndex(x => x.id === a.id);
          if (idx >= 0) Object.assign(AGENTS[idx], a);
        }
        renderGrid(AGENTS);
      }
    }
  } catch (_) {}
})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova AI — Offline</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #050816;
  --surface: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.08);
  --text: #E8E6F0;
  --dim: rgba(232,230,240,0.5);
  --purple: #7B61FF;
  --green: #34D399;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-app-region: drag;
}
.titlebar {
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--dim);
  letter-spacing: 0.5px;
  flex-shrink: 0;
}
.titlebar .status {
  display: flex;
  align-items: center;
  gap: 6px;
}
.titlebar .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #FBBF24;
  box-shadow: 0 0 6px rgba(251,191,36,0.5);
}
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  -webkit-app-region: no-drag;
}
.message {
  max-width: 80%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.5;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.message.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #6B51EF, #8B6BFF);
  border-bottom-right-radius: 4px;
}
.message.assistant {
  align-self: flex-start;
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.message.error {
  align-self: center;
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.2);
  color: #FCA5A5;
  font-size: 13px;
}
.welcome {
  text-align: center;
  margin: auto;
  padding: 40px 20px;
}
.welcome h1 {
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 8px;
}
.welcome h1 span { color: var(--purple); }
.welcome p { color: var(--dim); font-size: 14px; margin-bottom: 20px; }
.welcome .badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(251,191,36,0.08);
  border: 1px solid rgba(251,191,36,0.15);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 12px;
  color: #FBBF24;
}
.input-area {
  padding: 12px 20px 20px;
  flex-shrink: 0;
  -webkit-app-region: no-drag;
}
.input-bar {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 10px 14px;
  transition: border-color 0.2s;
}
.input-bar:focus-within { border-color: rgba(123,97,255,0.3); }
.input-bar textarea {
  flex: 1;
  background: none;
  border: none;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  resize: none;
  outline: none;
  max-height: 120px;
  line-height: 1.4;
}
.input-bar textarea::placeholder { color: var(--dim); }
.send-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--purple);
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.1s, opacity 0.2s;
  flex-shrink: 0;
}
.send-btn:hover { transform: scale(1.05); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.model-info {
  text-align: center;
  padding: 4px 0 0;
  font-size: 11px;
  color: var(--dim);
}
.thinking {
  align-self: flex-start;
  padding: 12px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  display: none;
}
.thinking span {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--purple);
  margin: 0 2px;
  animation: bounce 1.2s infinite;
}
.thinking span:nth-child(2) { animation-delay: 0.2s; }
.thinking span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-6px); }
}
/* Voice button */
.voice-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: transparent;
  color: var(--dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.2s, background 0.2s;
}
.voice-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.voice-btn.active { color: #EF4444; background: rgba(239,68,68,0.1); }
/* Setup screen */
.setup-progress { margin-top: 24px; width: 280px; }
.setup-bar { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
.setup-bar-fill { height: 100%; background: var(--purple); border-radius: 4px; width: 0%; transition: width 0.3s; animation: indeterminate 2s ease-in-out infinite; }
@keyframes indeterminate { 0% { width: 0%; margin-left: 0; } 50% { width: 60%; margin-left: 20%; } 100% { width: 0%; margin-left: 100%; } }
.setup-bar-fill.determinate { animation: none; }
.setup-text { margin-top: 12px; font-size: 12px; color: var(--dim); text-align: center; }
</style>
</head>
<body>
<div class="titlebar">
  <div class="status"><span class="dot"></span> Offline Mode — Local AI</div>
</div>

<div class="chat-area" id="chatArea">
  <!-- Setup screen (first run) -->
  <div class="welcome" id="setupScreen" style="display:none">
    <h1>Setting up <span>Nova</span> ✨</h1>
    <p>Downloading your local AI model. This only happens once.</p>
    <div class="setup-progress" id="setupProgress">
      <div class="setup-bar"><div class="setup-bar-fill" id="setupBarFill"></div></div>
      <div class="setup-text" id="setupText">Preparing...</div>
    </div>
  </div>
  <!-- Normal welcome -->
  <div class="welcome" id="welcome">
    <h1>Hello, I'm <span>Nova.</span></h1>
    <p>Running locally on your machine. Private, fast, no internet needed.</p>
    <div class="badge">⚡ Powered by Ollama</div>
  </div>
</div>

<div class="thinking" id="thinking"><span></span><span></span><span></span></div>

<div class="input-area">
  <div class="input-bar">
    <button class="voice-btn" id="voiceBtn" title="Voice input" onclick="toggleVoice()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <textarea id="chatInput" rows="1" placeholder="Ask Nova anything..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="model-info" id="modelInfo">Connecting to Ollama...</div>
</div>

<script>
const chatArea = document.getElementById('chatArea');
const chatInput = document.getElementById('chatInput');
const thinking = document.getElementById('thinking');
const modelInfo = document.getElementById('modelInfo');
const welcome = document.getElementById('welcome');
let messages = [];
let currentModel = '';
let isListening = false;

// ── Init ──
async function init() {
  if (!window.novaDesktop) {
    modelInfo.textContent = '⚠️ Desktop bridge not available';
    return;
  }

  // Listen for setup events
  novaDesktop.on('setup:pulling', (model) => {
    document.getElementById('welcome').style.display = 'none';
    document.getElementById('setupScreen').style.display = '';
    document.getElementById('setupText').textContent = `Downloading ${model}...`;
  });
  novaDesktop.on('setup:progress', (msg) => {
    document.getElementById('setupText').textContent = msg;
    // Try to parse percentage
    const match = msg.match(/(\d+)%/);
    if (match) {
      const fill = document.getElementById('setupBarFill');
      fill.classList.add('determinate');
      fill.style.width = match[1] + '%';
    }
  });
  novaDesktop.on('setup:done', (ok) => {
    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('welcome').style.display = '';
    if (ok) initChat();
    else modelInfo.textContent = '⚠️ Model download failed. Check your connection.';
  });

  // Check status
  const status = await novaDesktop.ollama.status();
  if (status.online) {
    initChat();
  } else {
    // Trigger setup (starts Ollama + pulls model)
    modelInfo.textContent = 'Starting local AI...';
    const result = await novaDesktop.setup.ensure();
    if (result.ok) initChat();
    else modelInfo.textContent = '⚠️ Could not start local AI. Restart the app.';
  }

  // Listen for voice hotkey
  novaDesktop.on('voice:hotkey', () => toggleVoice());
}

async function initChat() {
  const models = await novaDesktop.ollama.models();
  currentModel = models[0] || 'llama3.2:3b';
  modelInfo.textContent = `⚡ ${currentModel} — Local`;
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('welcome').style.display = '';
}

// ── Send message ──
async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text) return;

  chatInput.value = '';
  autoResize(chatInput);
  if (welcome) welcome.remove();

  appendMessage('user', text);
  messages.push({ role: 'user', content: text });

  thinking.style.display = 'flex';
  chatArea.appendChild(thinking);
  chatArea.scrollTop = chatArea.scrollHeight;

  try {
    const result = await novaDesktop.ollama.chat(messages, currentModel);
    thinking.style.display = 'none';
    if (result.ok) {
      appendMessage('assistant', result.content);
      messages.push({ role: 'assistant', content: result.content });
    } else {
      appendMessage('error', result.error || 'Failed to get response');
    }
  } catch (err) {
    thinking.style.display = 'none';
    appendMessage('error', 'Error: ' + (err.message || 'Unknown'));
  }
}

function appendMessage(role, content) {
  const div = document.createElement('div');
  div.className = 'message ' + role;
  div.textContent = content;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Voice (Web Speech API) ──
let recognition = null;
function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    appendMessage('error', 'Speech recognition not available in this browser');
    return;
  }
  const voiceBtn = document.getElementById('voiceBtn');
  if (isListening) {
    recognition?.stop();
    isListening = false;
    voiceBtn.classList.remove('active');
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';
  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    chatInput.value = transcript;
    autoResize(chatInput);
    isListening = false;
    voiceBtn.classList.remove('active');
  };
  recognition.onerror = () => { isListening = false; voiceBtn.classList.remove('active'); };
  recognition.onend = () => { isListening = false; voiceBtn.classList.remove('active'); };
  recognition.start();
  isListening = true;
  voiceBtn.classList.add('active');
}

init();
</script>
</body>
</html>

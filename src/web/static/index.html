<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova — Web Control Hub</title>
<style>
/* ── Reset & Variables ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #1e1e2e;
  --bg-card:   rgba(30, 30, 50, 0.7);
  --bg-input:  rgba(255, 255, 255, 0.06);
  --border:    rgba(255, 255, 255, 0.08);
  --text:      #e0e0e0;
  --text-dim:  #888;
  --accent:    #00BCD4;
  --accent-bg: rgba(0, 188, 212, 0.12);
  --green:     #4caf50;
  --red:       #ef5350;
  --orange:    #ffa726;
  --radius:    12px;
  --glass:     saturate(180%) blur(16px);
}

html { font-size: 15px; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Layout ────────────────────────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  backdrop-filter: var(--glass);
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(30, 30, 46, 0.85);
}
.header h1 { font-size: 1.3rem; font-weight: 600; }
.header h1 span { color: var(--accent); }
.header-status {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.85rem;
  color: var(--text-dim);
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--red);
  transition: background 0.3s;
}
.dot.green { background: var(--green); }
.dot.orange { background: var(--orange); }

.nav {
  display: flex;
  gap: 0;
  padding: 0 1.5rem;
  border-bottom: 1px solid var(--border);
  background: rgba(30, 30, 46, 0.6);
  overflow-x: auto;
}
.nav button {
  background: none;
  border: none;
  color: var(--text-dim);
  padding: 0.75rem 1.2rem;
  cursor: pointer;
  font-size: 0.9rem;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all 0.2s;
}
.nav button:hover { color: var(--text); }
.nav button.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.main { padding: 1.5rem; max-width: 1100px; margin: 0 auto; }

.panel { display: none; }
.panel.active { display: block; }

/* ── Cards (glassmorphism) ─────────────────────────────────────── */
.card {
  background: var(--bg-card);
  backdrop-filter: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1rem;
}
.card h2 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 0.75rem;
  color: var(--accent);
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 0.75rem;
}
.stat {
  background: var(--bg-input);
  border-radius: 8px;
  padding: 0.75rem 1rem;
}
.stat-label {
  font-size: 0.75rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.25rem;
}
.stat-value {
  font-size: 1.1rem;
  font-weight: 600;
}

/* ── Buttons ───────────────────────────────────────────────────── */
.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 0.55rem 1.2rem;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 500;
  transition: opacity 0.2s, transform 0.1s;
}
.btn:hover { opacity: 0.85; }
.btn:active { transform: scale(0.97); }
.btn.red { background: var(--red); }
.btn.outline {
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
}
.btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.75rem; }

/* ── Chat ──────────────────────────────────────────────────────── */
.chat-container {
  display: flex;
  flex-direction: column;
  height: 55vh;
  min-height: 300px;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 0.75rem 0;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.msg {
  max-width: 85%;
  padding: 0.6rem 0.9rem;
  border-radius: 10px;
  font-size: 0.9rem;
  line-height: 1.45;
  word-break: break-word;
}
.msg.user {
  align-self: flex-end;
  background: var(--accent-bg);
  border: 1px solid rgba(0, 188, 212, 0.2);
}
.msg.agent {
  align-self: flex-start;
  background: var(--bg-input);
}
.msg.system {
  align-self: center;
  color: var(--text-dim);
  font-size: 0.8rem;
  font-style: italic;
}
.chat-input-row {
  display: flex;
  gap: 0.5rem;
  padding-top: 0.75rem;
  border-top: 1px solid var(--border);
}
.chat-input-row input {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.6rem 0.9rem;
  color: var(--text);
  font-size: 0.9rem;
  outline: none;
}
.chat-input-row input:focus { border-color: var(--accent); }

/* ── Vision ────────────────────────────────────────────────────── */
.vision-result {
  background: var(--bg-input);
  border-radius: 8px;
  padding: 1rem;
  margin-top: 0.75rem;
  white-space: pre-wrap;
  font-size: 0.9rem;
  line-height: 1.5;
  max-height: 300px;
  overflow-y: auto;
}

/* ── Settings ──────────────────────────────────────────────────── */
.settings-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 0.75rem;
}
.field label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-bottom: 0.3rem;
}
.field input, .field select {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.55rem 0.75rem;
  color: var(--text);
  font-size: 0.9rem;
  outline: none;
}
.field input:focus, .field select:focus { border-color: var(--accent); }

/* ── Logs ──────────────────────────────────────────────────────── */
.log-area {
  background: #0d0d16;
  border-radius: 8px;
  padding: 0.75rem;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 0.8rem;
  line-height: 1.5;
  max-height: 60vh;
  overflow-y: auto;
  color: var(--text-dim);
}
.log-area .log-info { color: var(--accent); }
.log-area .log-error { color: var(--red); }
.log-area .log-warn { color: var(--orange); }

/* ── Responsive ────────────────────────────────────────────────── */
@media (max-width: 600px) {
  .header { padding: 0.75rem 1rem; }
  .main { padding: 1rem; }
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .chat-container { height: 45vh; }
  .nav button { padding: 0.6rem 0.8rem; font-size: 0.82rem; }
}

/* ── Scrollbar ─────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>⚡ <span>Nova</span> Control Hub</h1>
  <div class="header-status">
    <div class="dot" id="statusDot"></div>
    <span id="statusLabel">Connecting…</span>
  </div>
</div>

<!-- Navigation tabs -->
<div class="nav" id="nav">
  <button class="active" data-panel="status">Status</button>
  <button data-panel="chat">Chat</button>
  <button data-panel="vision">Vision</button>
  <button data-panel="settings">Settings</button>
  <button data-panel="logs">Logs</button>
</div>

<div class="main">

  <!-- ── Status Panel ──────────────────────────────────────────── -->
  <div class="panel active" id="panel-status">
    <div class="card">
      <h2>System Status</h2>
      <div class="stat-grid" id="statusGrid">
        <div class="stat">
          <div class="stat-label">Pipeline</div>
          <div class="stat-value" id="sPipeline">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Ollama</div>
          <div class="stat-value" id="sOllama">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Chat Model</div>
          <div class="stat-value" id="sChatModel">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Vision</div>
          <div class="stat-value" id="sVision">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">LLM Mode</div>
          <div class="stat-value" id="sLLMMode">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Uptime</div>
          <div class="stat-value" id="sUptime">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">RAM</div>
          <div class="stat-value" id="sRAM">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">GPU</div>
          <div class="stat-value" id="sGPU">—</div>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn" id="btnStart" onclick="startPipeline()">▶ Start Pipeline</button>
        <button class="btn red" id="btnStop" onclick="stopPipeline()">■ Stop Pipeline</button>
      </div>
    </div>

    <div class="card">
      <h2>Models Loaded</h2>
      <div id="modelsLoaded" style="font-size:0.9rem;color:var(--text-dim);">—</div>
    </div>
  </div>

  <!-- ── Chat Panel ────────────────────────────────────────────── -->
  <div class="panel" id="panel-chat">
    <div class="card chat-container">
      <div class="chat-messages" id="chatMessages">
        <div class="msg system">Send a message to Nova…</div>
      </div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="Type a message…"
               onkeydown="if(event.key==='Enter')sendChat()">
        <button class="btn" onclick="sendChat()">Send</button>
      </div>
    </div>
  </div>

  <!-- ── Vision Panel ──────────────────────────────────────────── -->
  <div class="panel" id="panel-vision">
    <div class="card">
      <h2>Screen Analysis</h2>
      <p style="font-size:0.85rem;color:var(--text-dim);margin-bottom:0.75rem;">
        Trigger a one-shot analysis of the current screen contents.
      </p>
      <button class="btn" onclick="analyzeScreen()">🔍 Analyze Screen</button>
      <div class="vision-result" id="visionResult" style="display:none;"></div>
    </div>
  </div>

  <!-- ── Settings Panel ────────────────────────────────────────── -->
  <div class="panel" id="panel-settings">
    <div class="card">
      <h2>Configuration</h2>
      <div class="settings-grid" id="settingsGrid">
        <div class="field">
          <label>Voice (macOS say)</label>
          <input type="text" id="cfgVoice" placeholder="Daniel">
        </div>
        <div class="field">
          <label>Chat Model</label>
          <input type="text" id="cfgModel" placeholder="qwen2.5:3b">
        </div>
        <div class="field">
          <label>Accent Color</label>
          <select id="cfgAccent">
            <option value="cyan">Cyan</option>
            <option value="green">Green</option>
            <option value="purple">Purple</option>
            <option value="orange">Orange</option>
            <option value="pink">Pink</option>
          </select>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn" onclick="saveSettings()">Save Changes</button>
      </div>
    </div>

    <div class="card">
      <h2>Read-Only</h2>
      <div class="stat-grid" id="roConfig"></div>
    </div>
  </div>

  <!-- ── Logs Panel ────────────────────────────────────────────── -->
  <div class="panel" id="panel-logs">
    <div class="card">
      <h2>Logs</h2>
      <button class="btn outline" onclick="refreshLogs()" style="margin-bottom:0.75rem;">Refresh</button>
      <div class="log-area" id="logArea">Waiting for logs…</div>
    </div>
  </div>

</div>

<script>
/* ── State ─────────────────────────────────────────────────────── */
const API = window.location.origin;
let ws = null;
let reconnectTimer = null;

/* ── Navigation ────────────────────────────────────────────────── */
document.querySelectorAll('.nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
  });
});

/* ── WebSocket ─────────────────────────────────────────────────── */
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');

  ws.onopen = () => {
    setHeaderStatus('Connected', 'green');
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      handleWSMessage(msg);
    } catch {}
  };

  ws.onclose = () => {
    setHeaderStatus('Disconnected', '');
    reconnectTimer = setTimeout(connectWS, 3000);
  };

  ws.onerror = () => ws.close();
}

function handleWSMessage(msg) {
  if (msg.type === 'status') updateStatusFromData(msg.data);
  if (msg.type === 'log') appendLog(msg.data);
  if (msg.type === 'chat') {
    if (msg.data.role === 'assistant') appendChat('agent', msg.data.content);
  }
  if (msg.type === 'vision') {
    const el = document.getElementById('visionResult');
    el.style.display = 'block';
    el.textContent = msg.data.analysis + '\n\n⏱ ' + msg.data.elapsed_ms + ' ms';
  }
}

function setHeaderStatus(label, color) {
  document.getElementById('statusLabel').textContent = label;
  const dot = document.getElementById('statusDot');
  dot.className = 'dot' + (color ? ' ' + color : '');
}

/* ── Status ────────────────────────────────────────────────────── */
async function refreshStatus() {
  try {
    const r = await fetch(API + '/api/status');
    const d = await r.json();
    updateStatusFromData(d);
  } catch { setHeaderStatus('Offline', ''); }
}

function updateStatusFromData(d) {
  const set = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };

  set('sPipeline', d.pipeline || '—');
  set('sOllama', d.ollama_running ? '✅ Running' : '❌ Stopped');
  set('sChatModel', d.chat_model_ready ? '✅ Ready' : '⚠️ Not loaded');
  set('sVision', d.vision || d.vision_model_ready ? '✅' : '—');
  set('sLLMMode', d.llm_mode || '—');
  set('sUptime', d.uptime_seconds ? formatUptime(d.uptime_seconds) : '—');
  set('sRAM', d.ram_available_gb ? d.ram_available_gb + ' / ' + d.ram_total_gb + ' GB' : '—');
  set('sGPU', d.gpu_available ? '✅ Available' : '❌ None');

  // Models loaded
  const ml = document.getElementById('modelsLoaded');
  if (d.models_loaded && d.models_loaded.length) {
    ml.textContent = d.models_loaded.join(', ');
  } else {
    ml.textContent = 'None loaded';
  }

  // Header dot
  if (d.pipeline === 'running') setHeaderStatus('Running', 'green');
  else if (d.ollama_running) setHeaderStatus('Idle', 'orange');
  else setHeaderStatus('Offline', '');
}

function formatUptime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = Math.floor(sec % 60);
  if (h > 0) return h + 'h ' + m + 'm';
  if (m > 0) return m + 'm ' + s + 's';
  return s + 's';
}

/* ── Pipeline Control ──────────────────────────────────────────── */
async function startPipeline() {
  try {
    const r = await fetch(API + '/api/start', { method: 'POST' });
    const d = await r.json();
    appendLog({ level: 'info', message: 'Start: ' + (d.status || d.error) });
    setTimeout(refreshStatus, 1000);
  } catch (e) { appendLog({ level: 'error', message: 'Start failed: ' + e }); }
}

async function stopPipeline() {
  try {
    const r = await fetch(API + '/api/stop', { method: 'POST' });
    const d = await r.json();
    appendLog({ level: 'info', message: 'Stop: ' + (d.status || d.error) });
    setTimeout(refreshStatus, 1000);
  } catch (e) { appendLog({ level: 'error', message: 'Stop failed: ' + e }); }
}

/* ── Chat ──────────────────────────────────────────────────────── */
async function sendChat() {
  const inp = document.getElementById('chatInput');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';

  appendChat('user', text);

  // Create a placeholder for streaming
  const agentEl = appendChat('agent', '');

  try {
    const resp = await fetch(API + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let accumulated = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });

      // Parse SSE lines
      for (const line of chunk.split('\n')) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          // Check for event type from preceding "event:" line
          accumulated += data;
          agentEl.textContent = accumulated;
        }
        if (line.startsWith('event: done')) {
          // Reset — the next data line is the full message
          accumulated = '';
        }
        if (line.startsWith('event: error')) {
          agentEl.textContent = '❌ ' + data;
        }
      }
    }

    // Scroll to bottom
    const container = document.getElementById('chatMessages');
    container.scrollTop = container.scrollHeight;

  } catch (e) {
    agentEl.textContent = '❌ Error: ' + e;
  }
}

function appendChat(role, content) {
  const container = document.getElementById('chatMessages');
  // Remove "Send a message" prompt
  const sys = container.querySelector('.msg.system');
  if (sys && sys.textContent.includes('Send a message')) sys.remove();

  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.textContent = content;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
  return el;
}

async function loadHistory() {
  try {
    const r = await fetch(API + '/api/history');
    const d = await r.json();
    if (d.history && d.history.length) {
      d.history.forEach(m => {
        const role = m.role === 'user' ? 'user' : 'agent';
        appendChat(role, m.content);
      });
    }
  } catch {}
}

/* ── Vision ────────────────────────────────────────────────────── */
async function analyzeScreen() {
  const el = document.getElementById('visionResult');
  el.style.display = 'block';
  el.textContent = 'Analyzing screen…';

  try {
    const r = await fetch(API + '/api/vision/analyze');
    const d = await r.json();
    if (d.analysis) {
      el.textContent = d.analysis + '\n\n⏱ ' + d.elapsed_ms + ' ms';
    } else {
      el.textContent = '❌ ' + (d.error || 'No result');
    }
  } catch (e) {
    el.textContent = '❌ Error: ' + e;
  }
}

/* ── Settings ──────────────────────────────────────────────────── */
async function loadConfig() {
  try {
    const r = await fetch(API + '/api/config');
    const d = await r.json();

    document.getElementById('cfgVoice').value = d.voice || '';
    document.getElementById('cfgModel').value = d.model || '';
    if (d.accent) document.getElementById('cfgAccent').value = d.accent;

    // Read-only fields
    const ro = document.getElementById('roConfig');
    ro.innerHTML = '';
    const fields = [
      ['Vision Model', d.vision_model],
      ['Wake Word', d.wake_word],
      ['Whisper Model', d.whisper_model],
      ['TTS Backend', d.tts_backend],
      ['Hybrid Mode', d.hybrid_mode ? 'Yes' : 'No'],
      ['Vision Enabled', d.vision_enabled ? 'Yes' : 'No'],
    ];
    fields.forEach(([label, val]) => {
      ro.innerHTML += `<div class="stat"><div class="stat-label">${label}</div><div class="stat-value">${val || '—'}</div></div>`;
    });
  } catch {}
}

async function saveSettings() {
  const body = {
    voice: document.getElementById('cfgVoice').value || undefined,
    model: document.getElementById('cfgModel').value || undefined,
    accent: document.getElementById('cfgAccent').value || undefined,
  };

  try {
    const r = await fetch(API + '/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const d = await r.json();
    appendLog({ level: 'info', message: 'Settings saved: ' + JSON.stringify(d.changes) });
  } catch (e) {
    appendLog({ level: 'error', message: 'Save failed: ' + e });
  }
}

/* ── Logs ──────────────────────────────────────────────────────── */
async function refreshLogs() {
  try {
    const r = await fetch(API + '/api/logs');
    const d = await r.json();
    const area = document.getElementById('logArea');
    area.innerHTML = '';
    (d.logs || []).forEach(l => appendLog(l));
  } catch {}
}

function appendLog(entry) {
  const area = document.getElementById('logArea');
  if (area.textContent === 'Waiting for logs…') area.innerHTML = '';
  const cls = 'log-' + (entry.level || 'info');
  const ts = entry.timestamp ? new Date(entry.timestamp * 1000).toLocaleTimeString() : '';
  const line = document.createElement('div');
  line.className = cls;
  line.textContent = (ts ? '[' + ts + '] ' : '') + (entry.message || '');
  area.appendChild(line);
  area.scrollTop = area.scrollHeight;
}

/* ── Init ──────────────────────────────────────────────────────── */
connectWS();
refreshStatus();
loadConfig();
loadHistory();
setInterval(refreshStatus, 10000);
</script>
</body>
</html>

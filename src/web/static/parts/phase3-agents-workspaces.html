    if (!agent && !COMING_AGENTS[name]) return;
    if (COMING_AGENTS[name]) return; // locked

    window.currentAgent = typeof agent === 'object' && agent.id ? agent.id : name;
    localStorage.setItem('nova_agent', window.currentAgent);

    // Try to call backend
    fetch('/api/agents/switch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent: window.currentAgent })
    }).catch(() => {});

    syncAgentCardsP3();

  function lightenColor(hex, percent) {
    const num = parseInt(hex.replace('#', ''), 16);
    const r = Math.min(255, (num >> 16) + Math.round(255 * percent / 100));
    const g = Math.min(255, ((num >> 8) & 0xFF) + Math.round(255 * percent / 100));
    const b = Math.min(255, (num & 0xFF) + Math.round(255 * percent / 100));
    return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
  }

  // Agent tint overlay on chat area

    const chatPanel = document.getElementById('chatPanel');

      overlay = document.createElement('div');
      overlay.id = 'agentTintOverlay';
      chatPanel.style.position = 'relative';
      chatPanel.insertBefore(overlay, chatPanel.firstChild);

    const ca = window.currentAgent || 'nova';
    const agent = CORE_AGENTS[ca] || getCustomAgents().find(a => a.id === ca);
    const color = agent ? agent.color : '#7B61FF';

    overlay.style.background = `radial-gradient(ellipse 80% 60% at 50% 0%, ${hexToRGBA(color, 0.04)} 0%, transparent 70%)`;
  }

  function hexToRGBA(hex, alpha) {
    const num = parseInt(hex.replace('#', ''), 16);
    return `rgba(${(num >> 16) & 0xFF},${(num >> 8) & 0xFF},${num & 0xFF},${alpha})`;
  }

    }

      : tasks.filter(t => t.status === _taskFilter);

    panel.innerHTML = `
      <div class="tasks-header">
        <div>

  window.toggleTaskDone = function(taskId) {
    const tasks = getTasks();
    const task = tasks.find(t => t.id === taskId);

    task.status = task.status === 'done' ? 'todo' : 'done';
    setTasks(tasks);

  window.cycleTaskStatus = function(taskId) {
    const tasks = getTasks();
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;
    const cycle = ['todo', 'in-progress', 'done'];
    const idx = cycle.indexOf(task.status);
    task.status = cycle[(idx + 1) % cycle.length];
    setTasks(tasks);
    renderTasksPanel();
  };

        Array.from(e.target.files).forEach(f => processKnowledgeFile(f));
        e.target.value = '';
      };
      input.click();
    }
  };

  function processKnowledgeFile(file) {
    const allowed = ['.txt', '.md', '.pdf'];
    const ext = '.' + file.name.split('.').pop().toLowerCase();
    if (!allowed.includes(ext)) {
      showToast('Unsupported file type. Use .txt, .md, or .pdf');
      return;
    }
    if (file.size > 5 * 1024 * 1024) {
      showToast('File too large (max 5MB)');
      return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
      const docs = getKnowledgeDocs();
      const doc = {
        id: 'doc-' + Date.now().toString(36),
        name: file.name,
        size: file.size,
        type: file.type || ext,
        content: e.target.result,
        uploadedAt: Date.now()
      };
      docs.unshift(doc);
      setKnowledgeDocs(docs);
      renderKnowledgePanel();
      showToast('"' + file.name + '" uploaded!');
    };
    reader.readAsText(file);
  }

  window.deleteKnowledgeDoc = function(docId) {
    if (!confirm('Delete this document?')) return;
    let docs = getKnowledgeDocs();
    docs = docs.filter(d => d.id !== docId);
    setKnowledgeDocs(docs);
    renderKnowledgePanel();
    showToast('Document deleted');
  };


  // ─────────────────────────────────────────────────
  //  5. PATCH switchPanel FOR NEW PANELS
  // ─────────────────────────────────────────────────

  const _origSwitchPanel = window.switchPanel;
  window.switchPanel = function(name) {
    // Call original to handle nav state, show/hide, etc.
    _origSwitchPanel(name);

    // Additional panel-specific init
    if (name === 'tasks') renderTasksPanel();
    if (name === 'knowledge') renderKnowledgePanel();
    if (name === 'agents') syncAgentCardsP3();
    if (name === 'spaces') syncSpaceCardsP3();
  };


  // ─────────────────────────────────────────────────
  //  6. INIT ON LOAD
  // ─────────────────────────────────────────────────

  function p3Init() {
    // Restore agent from localStorage
    const savedAgent = localStorage.getItem('nova_agent');
    if (savedAgent) {
      // Validate it's a real agent (core or custom)
      if (CORE_AGENTS[savedAgent] || getCustomAgents().find(a => a.id === savedAgent)) {
        window.currentAgent = savedAgent;
      }
    }

    // Restore workspace from localStorage
    const savedWs = localStorage.getItem('nova_workspace');
    if (savedWs && WORKSPACE_DEFS[savedWs]) {
      window.currentWorkspace = savedWs;
    }

    // Apply UI states
    applyAgentTint();
    applyWorkspaceUI();
    updateTaskBadge();
    updateKnowledgeBadge();
    updateWelcomeForAgent();

    // Update agent card colors to match spec
    updateAgentCardColors();
  }

  function updateAgentCardColors() {
    // Ensure core agent cards use the specified accent colors
    const colorMap = {
      nova: '#7B61FF',
      desi: '#FF6B9D',
      lesi: '#34D399',
      redi: '#FF8C42',
    };
    Object.entries(colorMap).forEach(([id, color]) => {
      const card = document.querySelector(`.agent-card[data-agent="${id}"]`);
      if (card) {
        card.style.setProperty('--agent-glow', color);
        const avatar = card.querySelector('.agent-avatar');
        if (avatar) {
          avatar.style.background = `linear-gradient(135deg, ${color}, ${lightenColor(color, 20)})`;
        }
      }
    });
  }

  // Run init after DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => setTimeout(p3Init, 150));
  } else {
    setTimeout(p3Init, 150);
  }

  // Escape key closes all phase 3 modals
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      document.getElementById('createAgentModal')?.classList.remove('active');
      document.getElementById('createTaskModal')?.classList.remove('active');
    }
  });

})();
</script>

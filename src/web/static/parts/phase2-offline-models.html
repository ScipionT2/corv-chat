   * speed indicators, context windows, recommended badge, and status dots.
   */
  function enhanceModelCards() {
    document.querySelectorAll('.model-card').forEach(card => {
      // Skip if already enhanced
      if (card.dataset.p2Enhanced) return;
      card.dataset.p2Enhanced = '1';

      const modelId = card.dataset.value;
      const meta = MODEL_META[modelId];
      if (!meta) return;

      // ── Status dot (active/loading indicator) ──
      const statusDot = document.createElement('div');
      statusDot.className = 'model-status-dot';
      card.appendChild(statusDot);

      // ── Recommended badge for Nova Auto ──
      if (modelId === 'nova-auto') {
        const recBadge = document.createElement('div');
        recBadge.className = 'model-recommended-badge';
        recBadge.textContent = '★ RECOMMENDED';
        card.appendChild(recBadge);

      // ── Provider badge ──
      const provBadge = document.createElement('div');
      provBadge.className = `model-provider-badge provider-${meta.provider}`;
      provBadge.textContent = meta.providerLabel;
      card.appendChild(provBadge);

      // ── Speed indicator ──
      const speedInfo = SPEED_LABELS[meta.speed] || SPEED_LABELS.medium;
      const speedBadge = document.createElement('div');
      speedBadge.className = `model-speed-badge speed-${meta.speed}`;
      speedBadge.innerHTML = `<span class="speed-icon">${speedInfo.icon}</span> ${speedInfo.label}`;
      card.appendChild(speedBadge);

      // ── Context window ──
      const ctxBadge = document.createElement('div');
      ctxBadge.className = 'model-context-badge';
      ctxBadge.textContent = meta.context + ' context';
      card.appendChild(ctxBadge);
    });
  }

  // Run on load and when models panel opens

    if (_origLoadModelsPanel) _origLoadModelsPanel();
    enhanceModelCards();
  };

  // Also enhance on initial DOM ready
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(enhanceModelCards, 150);
  });
  // Run immediately too in case DOM is already ready
  if (document.readyState !== 'loading') {
    setTimeout(enhanceModelCards, 150);
  }


  /* ─── Model switching: loading state ─── */
  const _origSelectModelCard = window.selectModelCard;
  window.selectModelCard = function(card) {
    // Add loading state to the target card
    document.querySelectorAll('.model-card.loading').forEach(c => c.classList.remove('loading'));
    card.classList.add('loading');
    // Call original
    if (_origSelectModelCard) _origSelectModelCard(card);
    // After a brief delay, remove loading (model switch is instant in localStorage)
    setTimeout(() => {
      card.classList.remove('loading');

    const badge = document.createElement('div');

      📤 <span class="queue-count">0</span> messages queued — will send when back online
    `;
    inputContainer.insertBefore(badge, inputContainer.firstChild);
  }

  // ── Offline settings section — inject into settings panel ──
  function injectOfflineSettings() {
    const settingsPanel = document.getElementById('panel-settings');
    if (!settingsPanel || document.getElementById('offlineSettingsSection')) return;

    // Insert after the API Keys section (before Danger Zone)
    const dangerSection = settingsPanel.querySelector('.settings-section-title[style*="EF4444"]');
    const insertBefore = dangerSection ? dangerSection.closest('.settings-section') : null;

    const section = document.createElement('div');
    section.id = 'offlineSettingsSection';
    section.className = 'settings-section';
    section.innerHTML = `
      <div class="settings-section-title">OFFLINE MODE</div>
      <p class="text-dim" style="font-size:12px;margin-bottom:14px">
        Enable offline mode for local model support and message caching when the server is unreachable.
      </p>
      <div class="settings-row">
        <label class="settings-label">Enable Offline Mode</label>
        <div class="settings-toggle" onclick="window._p2ToggleOffline()">
          <div id="offlineModeToggle" class="settings-toggle-switch ${offlineModeEnabled ? 'on' : ''}"></div>
        </div>
      </div>
      <div class="settings-row" style="margin-top:8px">
        <label class="settings-label">Ollama Server</label>
        <input type="text" id="ollamaServerUrl" class="settings-input" 
               placeholder="http://localhost:11434" 
               value="${localStorage.getItem('nova_ollama_url') || 'http://localhost:11434'}"
               style="max-width:220px" />
      </div>
      <div class="settings-row">
        <label class="settings-label">Cache Messages Offline</label>
        <div class="settings-toggle" onclick="window._p2ToggleOfflineCache()">
          <div id="offlineCacheToggle" class="settings-toggle-switch ${localStorage.getItem('nova_offline_cache') !== '0' ? 'on' : ''}"></div>
        </div>
      </div>
      <button class="settings-btn-save" onclick="window._p2SaveOfflineSettings()" style="margin-top:12px">
        Save Offline Settings
      </button>
    `;

    if (insertBefore) {
      settingsPanel.insertBefore(section, insertBefore);
    } else {
      settingsPanel.appendChild(section);
    }
  }

  window._p2ToggleOffline = function() {
    offlineModeEnabled = !offlineModeEnabled;
    localStorage.setItem('nova_offline_mode', offlineModeEnabled ? '1' : '0');
    const toggle = document.getElementById('offlineModeToggle');
    if (toggle) toggle.classList.toggle('on', offlineModeEnabled);
    updateConnectionUI();
    if (offlineModeEnabled) {
      checkOllamaConnection();
    }
  };

  window._p2ToggleOfflineCache = function() {
    const current = localStorage.getItem('nova_offline_cache') !== '0';
    localStorage.setItem('nova_offline_cache', current ? '0' : '1');
    const toggle = document.getElementById('offlineCacheToggle');
    if (toggle) toggle.classList.toggle('on', !current);
  };

  window._p2SaveOfflineSettings = function() {
    const url = document.getElementById('ollamaServerUrl')?.value?.trim();
    if (url) localStorage.setItem('nova_ollama_url', url);
    if (typeof showToast === 'function') showToast('Offline settings saved');
    if (offlineModeEnabled) checkOllamaConnection();
  };

  // ── Local Models section in Models panel ──
  function injectLocalModelsSection() {
    const modelsPanel = document.getElementById('panel-models');
    if (!modelsPanel || document.getElementById('localModelsSection')) return;

    const section = document.createElement('div');
    section.id = 'localModelsSection';
    section.className = 'local-models-section';
    section.innerHTML = `
      <div class="local-models-header">
        <div class="local-models-title">
          <span class="local-icon">🖥️</span> LOCAL MODELS (OLLAMA)
        </div>
        <span id="ollamaStatus" class="local-models-status">Not Connected</span>
      </div>
      <div id="localModelsGrid" class="models-grid">
        <div class="local-models-placeholder">
          <div class="placeholder-icon">🔌</div>
          <div>No local models detected.</div>
          <div style="margin-top:6px;font-size:12px">
            Install <a href="https://ollama.ai" target="_blank">Ollama</a> and pull models to use them offline.
            <br>Enable Offline Mode in Settings to connect.
          </div>
        </div>
      </div>
    `;
    modelsPanel.appendChild(section);
  }

  // ── Check Ollama connection ──
  async function checkOllamaConnection() {
    if (!offlineModeEnabled) {
      ollamaConnected = false;
      updateOllamaUI();
      return;
    }

    const url = localStorage.getItem('nova_ollama_url') || 'http://localhost:11434';
    try {
      const res = await fetch(url + '/api/tags', { 
        method: 'GET',
        signal: AbortSignal.timeout(3000)
      });
      if (res.ok) {
        const data = await res.json();
        ollamaConnected = true;
        updateOllamaUI(data.models || []);
        return;
      }
    } catch (_) {}

    ollamaConnected = false;
    updateOllamaUI();
  }

  function updateOllamaUI(models) {
    const statusEl = document.getElementById('ollamaStatus');
    const gridEl = document.getElementById('localModelsGrid');
    if (!statusEl || !gridEl) return;

    if (ollamaConnected && models && models.length > 0) {
      statusEl.textContent = `Connected · ${models.length} model${models.length !== 1 ? 's' : ''}`;
      statusEl.classList.add('connected');
      gridEl.innerHTML = models.map(m => {
        const name = m.name || m.model || 'Unknown';
        const size = m.size ? (m.size / 1e9).toFixed(1) + 'GB' : '';
        return `
          <div class="model-card local-model-card" data-value="local:${name}" data-icon="ollama" onclick="selectModelCard(this)">
            <div class="model-status-dot"></div>
            <img src="https://unpkg.com/@lobehub/icons-static-svg@latest/icons/ollama.svg" alt="" class="model-card-icon invert">
            <div class="model-card-name">${_escapeHtml(name.split(':')[0])}</div>
            <div class="model-card-provider">${size ? size + ' · ' : ''}Local</div>
            <div class="model-provider-badge provider-local">Ollama</div>
            <div class="model-speed-badge speed-fast"><span class="speed-icon">⚡</span> Local</div>
          </div>`;
      }).join('');
    } else if (ollamaConnected) {
      statusEl.textContent = 'Connected · No models';
      statusEl.classList.add('connected');
      gridEl.innerHTML = `
        <div class="local-models-placeholder">
          <div class="placeholder-icon">📦</div>
          <div>Ollama connected but no models found.</div>
          <div style="margin-top:6px;font-size:12px">
            Run <code>ollama pull llama3.2</code> to get started.
          </div>
        </div>`;
    } else {
      statusEl.textContent = offlineModeEnabled ? 'Disconnected' : 'Not Connected';
      statusEl.classList.remove('connected');
      gridEl.innerHTML = `
        <div class="local-models-placeholder">
          <div class="placeholder-icon">🔌</div>
          <div>No local models detected.</div>
          <div style="margin-top:6px;font-size:12px">
            Install <a href="https://ollama.ai" target="_blank">Ollama</a> and pull models to use them offline.
            ${!offlineModeEnabled ? '<br>Enable Offline Mode in Settings to connect.' : ''}
          </div>
        </div>`;
    }
  }

  // ── Connection monitoring ──
  function updateConnectionUI() {
    const bar = document.getElementById('connectionStatusBar');
    const badge = document.getElementById('offlineHeaderBadge');
    const statusDot = document.querySelector('.status-dot');
    const onlineText = document.querySelector('.online-text');

    if (bar) {
      if (isOnline) {
        bar.className = 'connection-status-bar online';
        bar.querySelector('.connection-status-text').textContent = 'Connected';
      } else {
        bar.className = 'connection-status-bar offline';
        bar.querySelector('.connection-status-text').textContent = 'Offline';
      }
    }

    if (badge) {
      badge.classList.toggle('visible', !isOnline);
    }

    // Update the widget status area
    if (statusDot) {
      statusDot.style.background = isOnline ? 'var(--green)' : '#EF4444';
      statusDot.style.boxShadow = isOnline
        ? '0 0 8px rgba(52,211,153,.5)'
        : '0 0 8px rgba(239,68,68,.5)';
    }
    if (onlineText) {
      onlineText.textContent = isOnline ? 'Online' : 'Offline';
      onlineText.style.color = isOnline ? 'var(--green)' : '#EF4444';
    }

    // Update queue badge
    updateQueueBadge();
  }

  function updateQueueBadge() {
    const badge = document.getElementById('offlineQueueBadge');
    if (!badge) return;
    const count = offlineQueue.length;
    badge.classList.toggle('visible', count > 0);
    const countEl = badge.querySelector('.queue-count');
    if (countEl) countEl.textContent = count;
  }

  // ── Store messages in localStorage as fallback ──
  function saveMessageOffline(role, content, model) {
    if (localStorage.getItem('nova_offline_cache') === '0') return;
    const msg = {
      role,
      content,
      model: model || 'unknown',
      timestamp: Date.now(),
    };
    offlineQueue.push(msg);
    localStorage.setItem('nova_offline_queue', JSON.stringify(offlineQueue));
    updateQueueBadge();
  }

  // ── Flush queued messages when back online ──
  async function flushOfflineQueue() {
    if (!offlineQueue.length || !isOnline) return;

    const queue = [...offlineQueue];
    offlineQueue = [];
    localStorage.setItem('nova_offline_queue', '[]');
    updateQueueBadge();

    // Note: These messages were already displayed in chat.
    // We just need to sync them to the server if we have an active chat.
    // For now, just clear the queue. Full sync would require server support.
    if (typeof showToast === 'function') {
      showToast(`${queue.length} queued message${queue.length !== 1 ? 's' : ''} synced`);
    }
  }

  // ── Online/Offline event listeners ──
  window.addEventListener('online', () => {
    isOnline = true;
    reconnectAttempts = 0;
    updateConnectionUI();
    flushOfflineQueue();
    if (typeof showToast === 'function') showToast('Connection restored ✓');
  });

  window.addEventListener('offline', () => {
    isOnline = false;
    updateConnectionUI();
    if (typeof showToast === 'function') showToast('Connection lost — messages will be queued');
  });

  // ── Periodic health check (every 30s) ──
  async function healthCheck() {
    if (!navigator.onLine) {
      isOnline = false;
      updateConnectionUI();
      return;
    }

    try {
      const res = await fetch('/api/health', {
        method: 'GET',
        signal: AbortSignal.timeout(5000),
      });
      isOnline = res.ok;
      if (isOnline) reconnectAttempts = 0;
    } catch (_) {
      isOnline = false;
    }
    updateConnectionUI();
  }

  // Health check less frequently to avoid noise
  setInterval(healthCheck, 30000);


  /* ═══════════════════════════════════════════════════════
     3. HYBRID ROUTING UI
     ═══════════════════════════════════════════════════════ */

  // Track the last provider used for display
  let lastProvider = 'openrouter';
  let lastModelUsed = '';

  /**
   * Patch the appendChat function to add provider badges on assistant messages.
   * We hook into the SSE stream's `done` event to get provider info.
   */
  const _origAppendChat = window.appendChat;
  window.appendChat = function(role, content, opts = {}) {
    const div = _origAppendChat(role, content, opts);

    // For assistant messages, add provider badge to meta area
    if (role === 'assistant' && div) {
      const metaEl = div.querySelector('.msg-meta');
      if (metaEl) {
        // Determine provider from model or the tracked lastProvider
        const model = opts.model || (typeof currentModel !== 'undefined' ? currentModel : 'nova-auto');
        const meta = MODEL_META[model];
        const providerName = opts.provider || (meta ? meta.provider : lastProvider);
        const providerLabel = PROVIDER_LABELS[providerName] || providerName;

        // Add provider badge
        const badge = document.createElement('span');
        const provClass = 'via-' + (providerName || 'openrouter').toLowerCase();
        badge.className = `msg-provider-badge ${provClass}`;
        badge.innerHTML = `via ${_escapeHtml(providerLabel)}`;
        metaEl.appendChild(badge);

        // If there was a fallback, show indicator
        if (opts.fallback) {
          const fallback = document.createElement('span');
          fallback.className = 'msg-fallback-badge';
          fallback.innerHTML = `↩ fallback`;
          metaEl.appendChild(fallback);
        }

        // Make meta relative for tooltip
        metaEl.style.position = 'relative';
      }
    }

    return div;
  };

  /**
   * Patch sendChat to capture provider info from SSE done event
   * and to handle offline queueing
   */
  const _origSendChatP2 = window.sendChat;
  window.sendChat = async function() {
    // If offline and no offline mode, show error
    if (!isOnline && !offlineModeEnabled) {
      if (typeof appendChat === 'function') {
        appendChat('assistant', '⚡ You\'re offline. Enable Offline Mode in Settings to queue messages or use local models.');
      }
      return;
    }

    // If offline with offline mode, queue the message
    if (!isOnline && offlineModeEnabled) {
      const text = chatInput.value.trim();
      if (!text) return;

      // Save to queue
      saveMessageOffline('user', text, typeof currentModel !== 'undefined' ? currentModel : 'unknown');

      // Still show it in the UI
      chatInput.value = '';
      if (typeof autoResize === 'function') autoResize();
      if (typeof appendChat === 'function') {
        appendChat('user', text);
        appendChat('assistant', '📤 Message queued. Nova will respond when you\'re back online.', {
          provider: 'local',
        });
      }
      return;
    }

    return _origSendChatP2();
  };

  /**
   * Intercept SSE done events to extract provider info.
   * We monkey-patch the original sendChat's fetch to capture stream metadata.
   *
   * Since the server sends `event: done` with `{ provider, model, chat_id }`,
   * we need to capture that during streaming. We do this by wrapping fetch.
   */
  const _origFetch = window.fetch;
  window.fetch = function(url, options) {
    const result = _origFetch.apply(this, arguments);

    // Only intercept chat API calls
    if (typeof url === 'string' && (url.includes('/api/chat') || url.includes('/api/v2/chat')) && options?.method === 'POST') {
      result.then(response => {
        if (response.ok && response.body) {
          // Clone the response body to read SSE events
          // But since the original code already reads it, we just
          // watch for the done event pattern.
          // Instead, we'll use a different approach: parse the request body
          // to know the model, then infer the provider.
          try {
            const body = JSON.parse(options.body || '{}');
            const model = body.model || 'nova-auto';
            const meta = MODEL_META[model];
            if (meta) {
              lastProvider = meta.provider;
              lastModelUsed = model;
            }
          } catch (_) {}
        }
      }).catch(() => {});
    }

    return result;
  };

  /**
   * Add a provider indicator to the model bar
   */
  function injectProviderIndicator() {
    const modelBar = document.querySelector('.model-bar');
    if (!modelBar || document.getElementById('activeProviderIndicator')) return;

    const indicator = document.createElement('div');
    indicator.id = 'activeProviderIndicator';
    indicator.className = 'active-provider-indicator';
    indicator.innerHTML = `
      <span class="api-dot"></span>
      <span id="activeProviderLabel">via OpenRouter</span>
    `;

    // Insert before the settings key button if it exists
    const keyBtn = modelBar.querySelector('.settings-key-btn');
    if (keyBtn) {
      modelBar.insertBefore(indicator, keyBtn);
    } else {
      modelBar.appendChild(indicator);
    }
  }

  // ── Update active provider indicator when model changes ──
  function updateProviderIndicator() {
    const indicator = document.getElementById('activeProviderIndicator');
    const label = document.getElementById('activeProviderLabel');
    if (!indicator || !label) return;

    const model = typeof currentModel !== 'undefined' ? currentModel : 'nova-auto';
    const meta = MODEL_META[model];
    const provider = meta ? meta.provider : 'openrouter';
    const providerLabel = PROVIDER_LABELS[provider] || provider;

    label.textContent = `via ${providerLabel}`;
    indicator.classList.add('routed');
  }

  // Patch syncModelCards to also update provider indicator
  const _origSyncModelCards = window.syncModelCards;
  window.syncModelCards = function() {
    if (_origSyncModelCards) _origSyncModelCards();
    updateProviderIndicator();
  };


  /* ═══════════════════════════════════════════════════════
     INITIALIZATION — Wire everything up
     ═══════════════════════════════════════════════════════ */

  function _escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function initPhase2() {
    // Inject all UI elements
    injectConnectionStatus();
    injectOfflineBadge();
    injectQueueBadge();
    injectProviderIndicator();
    injectLocalModelsSection();
    injectOfflineSettings();
    enhanceModelCards();
    updateConnectionUI();
    updateProviderIndicator();

    // If offline mode is enabled, check Ollama
    if (offlineModeEnabled) {
      checkOllamaConnection();
    }

    console.log('[Nova Phase 2] Offline Foundation + Model Manager + Hybrid Routing loaded');
  }

  // Also hook into the settings panel load
  const _origLoadSettingsState = window.loadSettingsState;
  window.loadSettingsState = function() {
    if (_origLoadSettingsState) _origLoadSettingsState();
    injectOfflineSettings();
    // Refresh toggle states
    const offToggle = document.getElementById('offlineModeToggle');
    if (offToggle) offToggle.classList.toggle('on', offlineModeEnabled);
    const cacheToggle = document.getElementById('offlineCacheToggle');
    if (cacheToggle) cacheToggle.classList.toggle('on', localStorage.getItem('nova_offline_cache') !== '0');
  };

  // Init when ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => setTimeout(initPhase2, 200));
  } else {
    setTimeout(initPhase2, 200);
  }

})();
</script>

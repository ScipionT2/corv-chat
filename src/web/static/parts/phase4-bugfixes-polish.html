<script>
(function PHASE4_BugFixes() {
  'use strict';

  // Wait for DOM to be fully ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  function init() {

    // ═══════════════════════════════════════════════
    // BUG #1 FIX: Remove duplicate keydown listener
    // The original code registers Enter handler twice.
    // We remove the second one that was stored as chatInput._keyHandler
    // ═══════════════════════════════════════════════
    const ci = document.getElementById('chatInput');
    if (ci && ci._keyHandler) {
      ci.removeEventListener('keydown', ci._keyHandler);
      ci._keyHandler = null;
      console.log('[Phase4] Fixed: Removed duplicate keydown listener');
    }

    // ═══════════════════════════════════════════════
    // BUG #2 FIX: Include webSearchEnabled in API requests
    // Monkey-patch the sendChat to include web_search flag
    // ═══════════════════════════════════════════════
    // We wrap the existing fetch to inject web_search into the body
    const _origFetch = window.fetch;
    window.fetch = function(url, options) {
      if (typeof url === 'string' && url === '/api/v2/chat' && options && options.body) {
        try {
          const body = JSON.parse(options.body);
          if (typeof window.webSearchEnabled !== 'undefined') {
            body.web_search = window.webSearchEnabled;
          }
          options.body = JSON.stringify(body);
        } catch (_) {}
      }
      return _origFetch.apply(this, arguments);
    };
    console.log('[Phase4] Fixed: webSearchEnabled now sent with API requests');

    // ═══════════════════════════════════════════════
    // BUG #3 FIX: loadRecentConversations widget finder
    // The original uses querySelector('.widget .recent-item') which fails
    // because no .recent-item exists on first load.
    // We override loadRecentConversations with a fixed version.
    // ═══════════════════════════════════════════════
    window.loadRecentConversations = async function() {
      try {
        const res = await fetch('/api/chats');
        if (!res.ok) return;
        const data = await res.json();
        const chats = (data.chats || data || []).slice(0, 4);

        // Find the Recent Conversations widget by its label text
        const widgets = document.querySelectorAll('.widget');
        let recentWidget = null;
        widgets.forEach(w => {
          const label = w.querySelector('.widget-label');
          if (label && label.textContent.includes('RECENT')) {
            recentWidget = w;
          }
        });
        if (!recentWidget) return;

        // Remove existing recent items
        recentWidget.querySelectorAll('.recent-item').forEach(el => el.remove());

        // Find or create the view-all link
        let viewAll = recentWidget.querySelector('.view-all');

        // Insert new items
        chats.forEach(c => {
          const date = c.updated_at ? timeAgo(c.updated_at * 1000) : '';
          const title = c.title || 'Chat';
          const div = document.createElement('div');
          div.className = 'recent-item';
          div.style.cursor = 'pointer';
          div.onclick = () => loadChat(c.id);
          div.innerHTML = `<span class="recent-title">${escapeHtml(title.length > 35 ? title.slice(0,35) + '...' : title)}</span><span class="recent-time">${date}</span>`;
          if (viewAll) recentWidget.insertBefore(div, viewAll);
          else recentWidget.appendChild(div);
        });

        if (!chats.length) {
          const empty = document.createElement('div');
          empty.className = 'recent-item';
          empty.style.justifyContent = 'center';
          empty.style.color = 'var(--text-dim)';
          empty.style.fontSize = '12px';
          empty.innerHTML = '<span>No conversations yet</span>';
          if (viewAll) recentWidget.insertBefore(empty, viewAll);
          else recentWidget.appendChild(empty);
        }

        if (viewAll) {
          viewAll.onclick = (e) => { e.preventDefault(); switchPanel('memory'); };
        }
      } catch (_) {}
    };

    window.loadRecentConversations();
    console.log('[Phase4] Fixed: loadRecentConversations widget finder');

        const raw = localStorage.getItem('nova_active_chat');
        if (raw) {
          const data = JSON.parse(raw);
          if (data.history && data.history.length > 0) {

            const chatMsgs = document.getElementById('chatMessages');
            const firstMsg = chatMsgs.querySelector('.message.assistant:not(#thinkingBubble)');

    setInterval(() => {
      const tb = document.getElementById('thinkingBubble');
      if (tb && tb.style.display === 'flex') {
        if (!tb._showTime) {
          tb._showTime = Date.now();
        } else if (Date.now() - tb._showTime > 60000) {
          tb.style.display = 'none';
          tb._showTime = null;
          console.log('[Phase4] Safety: Hidden stuck thinkingBubble');
        }
      } else if (tb) {
        tb._showTime = null;
      }
    }, 5000);

    // BUG #6 FIX: formatMessage list regex
    // Override with improved version
    // ═══════════════════════════════════════════════
    window.formatMessage = function(text) {
      if (!text) return '';
      let h = text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
          return `<pre><code class="language-${lang || 'text'}">${code}</code></pre>`;
        })
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/\n/g, '<br>');

      // Fix list items: wrap consecutive <li> items in <ul>
      // First, convert list markers to <li>
      h = h.replace(/(^|<br>)[-*] (.+?)(?=<br>|$)/g, '$1<li>$2</li>');
      // Then wrap consecutive <li> blocks in <ul>
      h = h.replace(/(<li>[\s\S]*?<\/li>)+/g, '<ul>$&</ul>');
      // Clean up any <br> inside <ul>
      h = h.replace(/<ul><br>/g, '<ul>');
      h = h.replace(/<br><\/ul>/g, '</ul>');
      h = h.replace(/<\/li><br><li>/g, '</li><li>');

      return h;
    };

    // ═══════════════════════════════════════════════
    window.escapeHtml = function(s) {
      if (!s) return '';
      return s
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    };
    console.log('[Phase4] Fixed: escapeHtml now escapes quotes');

    // ═══════════════════════════════════════════════
    // BUG #11 FIX: startNewChat re-inserts welcome message
    // ═══════════════════════════════════════════════
    const _origStartNewChat = window.startNewChat;

          </div>`;
        chatMsgs.insertBefore(welcomeDiv, thinkBubble);
      }
      // Clear pending attachments (BUG #19)
      if (typeof window.pendingAttachments !== 'undefined') {
        window.pendingAttachments = [];
      }
      if (typeof window.renderAttachPreview === 'function') {
        window.renderAttachPreview();
      }
      console.log('[Phase4] Fixed: startNewChat restores welcome message');
    };

    // ═══════════════════════════════════════════════
    // BUG #14 FIX: keyModal event listener
    // Re-attach the backdrop click listener now that DOM is ready
    // ═══════════════════════════════════════════════
    const keyModal = document.getElementById('keyModal');
    if (keyModal) {
      keyModal.addEventListener('click', function(e) {
        if (e.target === e.currentTarget) {
          if (typeof closeKeyModal === 'function') closeKeyModal();
        }
      });
      console.log('[Phase4] Fixed: keyModal backdrop click listener attached');
    }

    // ═══════════════════════════════════════════════
    // BUG #21 FIX: Clock update frequency
    // ═══════════════════════════════════════════════
    // Clear the old 30s interval and use 15s
    // (we can't clear the old interval directly, but we can override updateClock
    // to be smarter and add a faster interval)
    if (typeof updateClock === 'function') {
      setInterval(updateClock, 15000);
      console.log('[Phase4] Fixed: Clock now updates every 15 seconds');
    }

    // ═══════════════════════════════════════════════
    // BUG #22 FIX: Mobile hamburger menu
    // ═══════════════════════════════════════════════
    // Inject the mobile menu button into the document body
    if (!document.getElementById('mobileMenuBtn')) {
      const btn = document.createElement('div');
      btn.className = 'mobile-menu-btn';
      btn.id = 'mobileMenuBtn';
      btn.onclick = toggleMobileMenu;
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>`;
      document.body.appendChild(btn);
    }

    window.toggleMobileMenu = function() {
      const sidebar = document.getElementById('sidebar');
      const isOpen = sidebar.classList.contains('mobile-open');

      if (isOpen) {
        sidebar.classList.remove('mobile-open');
        const overlay = document.querySelector('.mobile-overlay');
        if (overlay) overlay.remove();
      } else {
        sidebar.classList.add('mobile-open');
        const overlay = document.createElement('div');
        overlay.className = 'mobile-overlay';
        overlay.onclick = () => toggleMobileMenu();
        document.body.appendChild(overlay);
      }
    };

    // Close mobile menu when a nav item is clicked
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        const sidebar = document.getElementById('sidebar');
        if (sidebar.classList.contains('mobile-open')) {
          toggleMobileMenu();
        }
      });
    });

    console.log('[Phase4] All bug fixes applied ✓');
  }
})();

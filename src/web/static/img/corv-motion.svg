    <path d="M160 178c49 140 161 214 288 203 106-9 181-67 303-125-40 0-74 6-103 15-72 25-145 50-227 46-101-5-188-46-261-139Z" fill="#06101F" opacity=".55"/>
    <g id="lower">
      <path d="M200 359c142 59 260 26 374-34-61 107-144 185-250 228-59-34-102-97-124-194Z" fill="url(#body)"/>
      <path d="M238 484c105 40 197 19 284-31-55 82-127 140-218 174-41-29-62-73-66-143Z" fill="#742AFF"/>
      <path d="M197 357c112 51 222 34 327-37" stroke="#030814" stroke-width="27" stroke-linecap="round" opacity=".74"/>
      <path d="M235 482c86 39 179 23 278-37" stroke="#030814" stroke-width="27" stroke-linecap="round" opacity=".74"/>
    </g>
    <path d="M556 164c74 5 144 40 216 97-102-3-181 15-236 53l-28-58c-9-21 16-93 48-92Z" fill="#0A93FF"/>
    <path d="M640 248c42 2 86 7 132 13-53 14-97 31-135 52l-66-29c18-21 40-34 69-36Z" fill="#081020"/>
    <circle cx="512" cy="235" r="23" fill="#020712"/>
    <circle cx="518" cy="229" r="6" fill="#DFFFF7" opacity=".75"/>
    <path d="M160 178c117 113 269 133 459 46" stroke="white" stroke-opacity=".19" stroke-width="14" stroke-linecap="round"/>
  </g>
  <circle class="s" cx="128" cy="190" r="4" fill="#22E2FF"/><circle class="s s2" cx="778" cy="208" r="5" fill="#7B2CFF"/><circle class="s s3" cx="704" cy="582" r="4" fill="#22E2FF"/><circle class="s s2" cx="246" cy="586" r="3" fill="#F7C873"/><circle class="s" cx="454" cy="78" r="3" fill="#fff"/>

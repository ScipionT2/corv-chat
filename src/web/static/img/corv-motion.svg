<svg width="900" height="720" viewBox="0 0 900 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="body" x1="190" y1="172" x2="680" y2="548" gradientUnits="userSpaceOnUse"><stop stop-color="#22E2FF"/><stop offset=".48" stop-color="#167BFF"/><stop offset="1" stop-color="#7B2CFF"/></linearGradient>
    <linearGradient id="top" x1="160" y1="156" x2="710" y2="278" gradientUnits="userSpaceOnUse"><stop stop-color="#41EAFF"/><stop offset="1" stop-color="#0084FF"/></linearGradient>
    <radialGradient id="orb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(450 345) rotate(90) scale(320 390)"><stop stop-color="#12CFFF" stop-opacity=".26"/><stop offset="1" stop-color="#7B2CFF" stop-opacity="0"/></radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
    <style>
      @keyframes drift{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-22px) rotate(1.5deg)}}
      @keyframes wing{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-2.4deg)}}
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes dash{to{stroke-dashoffset:-900}}
      @keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
      #bird{transform-origin:450px 340px;animation:drift 5.6s ease-in-out infinite}#lower{transform-origin:350px 388px;animation:wing 2.8s ease-in-out infinite}.ring{transform-origin:450px 350px;animation:spin 20s linear infinite}.dash{stroke-dasharray:24 22;animation:dash 18s linear infinite}.s{animation:twinkle 3s ease-in-out infinite}.s2{animation-delay:.8s}.s3{animation-delay:1.5s}
    </style>
  </defs>
  <ellipse cx="450" cy="350" rx="350" ry="280" fill="url(#orb)"/>
  <g class="ring"><ellipse cx="450" cy="350" rx="330" ry="158" stroke="#16D8FF" stroke-opacity=".26" stroke-width="2" class="dash"/></g>
  <g class="ring" style="animation-duration:28s;animation-direction:reverse"><ellipse cx="450" cy="350" rx="232" ry="310" stroke="#7B2CFF" stroke-opacity=".22" stroke-width="2" class="dash" transform="rotate(55 450 350)"/></g>
  <g filter="url(#blur)" opacity=".45"><path d="M160 178c151 51 275-5 396-14 70-5 134 34 195 92-93-14-168 4-226 51-114 90-265 78-365-129Z" fill="#0FAEFF"/></g>
  <g id="bird">
